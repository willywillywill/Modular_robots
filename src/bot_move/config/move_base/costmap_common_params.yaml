footprint: [[0.18, 0.10], [0.18, -0.10], [-0.12, -0.10], [-0.12, 0.10]]

obstacle_layer:
  enabled: true
  observation_sources: scan

  scan:
    topic: /scan
    sensor_frame: laser
    data_type: LaserScan
    marking: true
    clearing: true
    obstacle_range: 3.0
    raytrace_range: 3.5
    min_obstacle_height: 0.0
    max_obstacle_height: 2.0

inflation_layer:
  enabled: true
  inflation_radius: 0.30
  cost_scaling_factor: 3.0